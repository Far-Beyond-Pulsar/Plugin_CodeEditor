[package]
name = "script_editor_plugin"
version = "0.1.4"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "script_editor_plugin"

[dependencies]
# Plugin API
plugin_editor_api = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }

# UI dependencies
gpui-ce = { git = "https://github.com/Far-Beyond-Pulsar/WGPUI", rev="b43b910b2bb71c3a1faacf7837d585bcc24c718b" }
ui = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }
ui_common = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }
ui_types_common = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }

# Engine dependencies
engine_state = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }
engine_backend = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "f099bdb68053f95c769d4588fd26eae3b8eb6bcf" }

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
parking_lot = "0.12"
tracing = "0.1"
log = "0.4"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"

# Async operations
futures = "0.3"

# Diff utilities
similar = "2.2"

# JSON schema derive
schemars = { version = "1.2", features = ["derive"] }
