[package]
name = "script_editor_plugin"
version = "0.1.4"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "script_editor_plugin"

[dependencies]
# Plugin API
plugin_editor_api = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }

# UI dependencies
gpui-ce = { git = "https://github.com/Far-Beyond-Pulsar/WGPUI", rev="1f6f3843e8bea050ed3882b45b5ca1d433adf61f" }
ui = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }
ui_common = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }
ui_types_common = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }

# Engine dependencies
engine_state = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }
engine_backend = { git = "https://github.com/Far-Beyond-Pulsar/Pulsar-Native", rev = "6d66619388d44bbbbffc440a586310076d7ff905" }

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
parking_lot = "0.12"
tracing = "0.1"
log = "0.4"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"

# Async operations
futures = "0.3"

# Diff utilities
similar = "2.2"

# JSON schema derive
schemars = { version = "1.2", features = ["derive"] }
