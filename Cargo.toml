[package]
name = "script_editor_plugin"
version = "0.1.4"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]
name = "script_editor_plugin"

[dependencies]
# Plugin API
plugin_editor_api = { path = "../Pulsar-Native/crates/plugin_editor_api" }

# UI dependencies
gpui-ce = { git = "https://github.com/Far-Beyond-Pulsar/WGPUI", rev = "53872e17a0e2f306ce4d9760ff2bdfa965b41337" }
ui = { path = "../WGPUI-Component/crates/ui" }
ui_common = { path = "../Pulsar-Native/ui-crates/ui_common" }
ui_types_common = { path = "../Pulsar-Native/ui-crates/ui_types_common" }

# Engine dependencies
engine_state = { path = "../Pulsar-Native/crates/engine_state" }
engine_backend = { path = "../Pulsar-Native/crates/engine_backend" }

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
parking_lot = "0.12"
tracing = "0.1"
log = "0.4"
anyhow = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"

# Async operations
futures = "0.3"

# Diff utilities
similar = "2.2"

# JSON schema derive
schemars = { version = "1.2", features = ["derive"] }
